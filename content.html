<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容分享 - MOONLIGHT</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">MOONLIGHT</div>
        <div class="nav-center">
            <div class="global-search">
                <input type="text" id="global-search-input" placeholder="搜索工具、日记、项目...">
                <button id="search-btn" onclick="performGlobalSearch()">🔍</button>
                <div id="search-results" class="search-dropdown"></div>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="tools.html">小工具</a></li>
            <li><a href="diary.html">日记</a></li>
            <li><a href="projects.html">项目</a></li>
            <li><a href="content.html" class="active">内容</a></li>
        </ul>
    </nav>

    <main class="container">
        <h1 class="page-title">内容分享</h1>

        <div class="content-layout">
            <!-- 左侧列表 -->
            <aside class="content-sidebar">
                <h2>📂 目录</h2>
                <div class="content-filter">
                    <input type="text" id="content-search" placeholder="搜索内容..." oninput="searchContents()">
                </div>
                <div id="content-list" class="content-list">
                    <div class="empty-state">加载中...</div>
                </div>
            </aside>

            <!-- 右侧详情 -->
            <article class="content-main empty" id="content-main">
                <div>
                    <p>👈 点击左侧条目查看详情</p>
                    <p style="font-size: 0.9rem; margin-top: 0.5rem;">支持 Markdown 文章、本地视频和 HTML 演示</p>
                </div>
            </article>
        </div>
    </main>

    <footer>
        <p>Made with 💙</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
